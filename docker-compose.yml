version: '3.8'

services:
  db:
    image: postgres:15
    container_name: splitwise-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: spiltwise_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    image: tanujachennurkar/splitwise-backend:latest
    container_name: splitwise-backend
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/spiltwise_db
    ports:
      - "8001:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:8001
    image: tanujachennurkar/splitwise-frontend:latest
    container_name: splitwise-frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata: